<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LJM Passport Photo Layout — A4 Print</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --ink: #1a1a18;
    --paper: #f5f2eb;
    --accent: #c8401a;
    --muted: #8a8778;
    --border: #d4cfc3;
    --success: #2d6a4f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 2.4rem;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  header h1 span {
    color: var(--accent);
    font-style: italic;
    font-weight: 300;
  }

  header p {
    margin-top: 10px;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 32px;
    width: 100%;
    max-width: 680px;
    margin-bottom: 24px;
  }

  .card-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
  }

  /* Drop zone */
  #dropzone {
    border: 2px dashed var(--border);
    border-radius: 2px;
    padding: 48px 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }

  #dropzone:hover, #dropzone.drag-over {
    border-color: var(--accent);
    background: #fff8f6;
  }

  #dropzone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    font-size: 2.5rem;
    margin-bottom: 12px;
    display: block;
  }

  .drop-title {
    font-family: 'Fraunces', serif;
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .drop-sub {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  /* Controls */
  .controls-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  .control-group label {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .control-group input, .control-group select {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    background: var(--paper);
    color: var(--ink);
    transition: border-color 0.15s;
  }

  .control-group input:focus, .control-group select:focus {
    outline: none;
    border-color: var(--accent);
  }

  /* Photo grid preview */
  #photo-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 10px;
    margin-top: 16px;
  }

  .photo-thumb {
    position: relative;
    aspect-ratio: 35/45;
    border: 1px solid var(--border);
    overflow: hidden;
    border-radius: 2px;
    background: #eee;
  }

  .photo-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .photo-thumb .remove-btn {
    position: absolute;
    top: 3px;
    right: 3px;
    width: 18px;
    height: 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s;
    line-height: 1;
  }

  .photo-thumb:hover .remove-btn {
    opacity: 1;
  }

  .photo-count {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 10px;
  }

  /* Layout preview */
  #preview-section {
    display: none;
  }

  .a4-preview-wrap {
    overflow-x: auto;
    margin-top: 16px;
  }

  /* actual A4 at 96dpi scale: 794px wide × 1123px tall */
  .a4-page {
    width: 794px;
    height: 1123px;
    background: #fff;
    border: 1px solid var(--border);
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    position: relative;
    flex-shrink: 0;
    overflow: hidden;
  }

  .a4-pages-container {
    display: flex;
    flex-direction: column;
    gap: 20px;
    align-items: flex-start;
  }

  .page-label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  /* Photo cell on preview page */
  .photo-cell {
    position: absolute;
    overflow: hidden;
    background: #ddd;
  }

  .photo-cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    border: none;
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--ink);
    color: var(--paper);
  }
  .btn-primary:hover { background: #333; }

  .btn-accent {
    background: var(--accent);
    color: #fff;
  }
  .btn-accent:hover { background: #a83415; }

  .btn-outline {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--border);
  }
  .btn-outline:hover { border-color: var(--ink); }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .actions-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 20px;
  }

  .info-bar {
    background: #f0ece3;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 10px 16px;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.04em;
    margin-top: 12px;
  }

  .info-bar strong { color: var(--ink); }

  #status-msg {
    font-size: 0.72rem;
    margin-top: 12px;
    color: var(--success);
    min-height: 18px;
  }

  @media (max-width: 500px) {
    .controls-row { grid-template-columns: 1fr; }
    .a4-page { transform-origin: top left; transform: scale(0.45); }
    .a4-preview-wrap { height: 520px; }
  }
</style>
</head>
<body>

<header>
  <h1>LJM Passport <span>Photo</span> Layout Generator</h1>
  <p>3.5 × 4.5 cm · A4 · Print-ready PDF</p>
</header>

<!-- Upload card -->
<div class="card">
  <div class="card-label">01 — Upload Photos</div>
  <div id="dropzone">
    <input type="file" id="file-input" accept="image/*" multiple>
    <span class="drop-icon">📷</span>
    <div class="drop-title">Drop photos here</div>
    <div class="drop-sub">or click to browse · JPG, PNG, WEBP</div>
  </div>
  <div id="photo-list"></div>
  <div class="photo-count" id="photo-count"></div>
</div>

<!-- Settings card -->
<div class="card">
  <div class="card-label">02 — Layout Settings</div>
  <div class="controls-row">
    <div class="control-group">
      <label>Photo Width (cm)</label>
      <input type="number" id="pw" value="3.5" step="0.1" min="1" max="10">
    </div>
    <div class="control-group">
      <label>Photo Height (cm)</label>
      <input type="number" id="ph" value="4.5" step="0.1" min="1" max="15">
    </div>
    <div class="control-group">
      <label>Margin — Page (cm)</label>
      <input type="number" id="margin" value="1.0" step="0.1" min="0" max="3">
    </div>
    <div class="control-group">
      <label>Gap Between Photos (cm)</label>
      <input type="number" id="gap" value="0.3" step="0.1" min="0" max="2">
    </div>
  </div>
  <div class="info-bar" id="layout-info">—</div>
  <div class="actions-row">
    <button class="btn btn-primary" id="btn-preview">Preview Layout</button>
    <button class="btn btn-accent" id="btn-pdf" disabled>Save as PDF</button>
  </div>
  <div id="status-msg"></div>
</div>

<!-- Preview card -->
<div class="card" id="preview-section">
  <div class="card-label">03 — Print Preview</div>
  <div class="a4-preview-wrap">
    <div class="a4-pages-container" id="pages-container"></div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let photos = []; // { id, src, name }
let idCounter = 0;

// ─── A4 constants ─────────────────────────────────────────────────────────────
const A4_W_CM = 21.0;
const A4_H_CM = 29.7;
const PX_PER_CM = 794 / A4_W_CM; // ~37.81 px/cm at preview scale

// ─── DOM refs ────────────────────────────────────────────────────────────────
const dropzone      = document.getElementById('dropzone');
const fileInput     = document.getElementById('file-input');
const photoList     = document.getElementById('photo-list');
const photoCount    = document.getElementById('photo-count');
const btnPreview    = document.getElementById('btn-preview');
const btnPdf        = document.getElementById('btn-pdf');
const statusMsg     = document.getElementById('status-msg');
const layoutInfo    = document.getElementById('layout-info');
const pagesContainer= document.getElementById('pages-container');
const previewSection= document.getElementById('preview-section');

// ─── Drag & drop ─────────────────────────────────────────────────────────────
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  loadFiles(Array.from(e.dataTransfer.files));
});
fileInput.addEventListener('change', () => loadFiles(Array.from(fileInput.files)));

function loadFiles(files) {
  files.filter(f => f.type.startsWith('image/')).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      photos.push({ id: idCounter++, src: e.target.result, name: file.name });
      renderThumbs();
      updateLayoutInfo();
    };
    reader.readAsDataURL(file);
  });
}

function renderThumbs() {
  photoList.innerHTML = '';
  photos.forEach(p => {
    const div = document.createElement('div');
    div.className = 'photo-thumb';
    div.innerHTML = `<img src="${p.src}" alt="${p.name}">
      <button class="remove-btn" data-id="${p.id}" title="Remove">✕</button>`;
    photoList.appendChild(div);
  });
  photoList.querySelectorAll('.remove-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      photos = photos.filter(p => p.id !== +btn.dataset.id);
      renderThumbs();
      updateLayoutInfo();
    });
  });
  photoCount.textContent = photos.length
    ? `${photos.length} photo${photos.length > 1 ? 's' : ''} loaded`
    : '';
  fileInput.value = '';
}

// ─── Layout calculation ──────────────────────────────────────────────────────
function getLayout() {
  const pw     = parseFloat(document.getElementById('pw').value)    || 3.5;
  const ph     = parseFloat(document.getElementById('ph').value)    || 4.5;
  const margin = parseFloat(document.getElementById('margin').value)|| 1.0;
  const gap    = parseFloat(document.getElementById('gap').value)   || 0.3;

  const usableW = A4_W_CM - 2 * margin;
  const usableH = A4_H_CM - 2 * margin;
  const cols = Math.floor((usableW + gap) / (pw + gap));
  const rows = Math.floor((usableH + gap) / (ph + gap));
  const perPage = cols * rows;

  return { pw, ph, margin, gap, cols, rows, perPage };
}

function updateLayoutInfo() {
  const { pw, ph, cols, rows, perPage } = getLayout();
  const pages = photos.length ? Math.ceil(photos.length / perPage) : '—';
  layoutInfo.innerHTML =
    `<strong>${cols} cols × ${rows} rows</strong> = ${perPage} photos/page &nbsp;·&nbsp; ` +
    `${photos.length} photos &nbsp;·&nbsp; <strong>${pages} page${pages > 1 ? 's' : ''}</strong>`;
}

['pw','ph','margin','gap'].forEach(id =>
  document.getElementById(id).addEventListener('input', updateLayoutInfo)
);

// ─── Preview ─────────────────────────────────────────────────────────────────
btnPreview.addEventListener('click', () => {
  if (!photos.length) { statusMsg.textContent = '⚠ Please upload at least one photo.'; return; }
  statusMsg.textContent = '';
  buildPreview();
  previewSection.style.display = 'block';
  btnPdf.disabled = false;
  previewSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
});

function buildPreview() {
  pagesContainer.innerHTML = '';
  const { pw, ph, margin, gap, cols, rows, perPage } = getLayout();

  const totalPages = Math.ceil(photos.length / perPage);

  for (let p = 0; p < totalPages; p++) {
    const wrap = document.createElement('div');
    const lbl  = document.createElement('div');
    lbl.className = 'page-label';
    lbl.textContent = `Page ${p + 1} of ${totalPages}`;
    wrap.appendChild(lbl);

    const page = document.createElement('div');
    page.className = 'a4-page';

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const idx = p * perPage + r * cols + c;
        if (idx >= photos.length) break;

        const x = (margin + c * (pw + gap)) * PX_PER_CM;
        const y = (margin + r * (ph + gap)) * PX_PER_CM;
        const w = pw * PX_PER_CM;
        const h = ph * PX_PER_CM;

        const cell = document.createElement('div');
        cell.className = 'photo-cell';
        cell.style.cssText = `left:${x}px;top:${y}px;width:${w}px;height:${h}px;`;
        cell.innerHTML = `<img src="${photos[idx].src}" alt="">`;
        page.appendChild(cell);
      }
    }

    wrap.appendChild(page);
    pagesContainer.appendChild(wrap);
  }
}

// ─── PDF export ──────────────────────────────────────────────────────────────
btnPdf.addEventListener('click', async () => {
  if (!photos.length) return;
  statusMsg.textContent = '⏳ Generating PDF…';
  btnPdf.disabled = true;

  await new Promise(r => setTimeout(r, 50)); // let UI update

  try {
    const { jsPDF } = window.jspdf;
    const { pw, ph, margin, gap, cols, rows, perPage } = getLayout();

    // jsPDF uses mm
    const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
    const A4W = 210, A4H = 297;
    const mgMM  = margin * 10;
    const pwMM  = pw * 10;
    const phMM  = ph * 10;
    const gapMM = gap * 10;

    const totalPages = Math.ceil(photos.length / perPage);

    for (let p = 0; p < totalPages; p++) {
      if (p > 0) doc.addPage();

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const idx = p * perPage + r * cols + c;
          if (idx >= photos.length) break;

          const x = mgMM + c * (pwMM + gapMM);
          const y = mgMM + r * (phMM + gapMM);

          // Load image to get natural dimensions for correct aspect
          await new Promise(resolve => {
            const img = new Image();
            img.onload = () => {
              doc.addImage(img, 'JPEG', x, y, pwMM, phMM, '', 'FAST');
              resolve();
            };
            img.onerror = resolve;
            img.src = photos[idx].src;
          });
        }
      }
    }

    doc.save('passport_photos.pdf');
    statusMsg.textContent = `✓ PDF saved — ${totalPages} page${totalPages > 1 ? 's' : ''}, ${photos.length} photos.`;
  } catch (err) {
    statusMsg.textContent = '✗ Error generating PDF. Try again.';
    console.error(err);
  }
  btnPdf.disabled = false;
});

// init
updateLayoutInfo();
</script>
</body>
</html>
